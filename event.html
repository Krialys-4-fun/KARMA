<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KARMA — Évènement</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo"><span>K</span>ARMA</div>
    <div class="navbar-links">
      <a class="navbar-link" href="index.html">Accueil</a>
      <a class="navbar-link active" href="#">Évènement</a>
    </div>
    <div class="navbar-user">
      <span class="mode-badge" id="mode-badge"></span>
      <div class="avatar" id="avatar" onclick="handleLogout()"></div>
    </div>
  </nav>

  <!-- BANNIERE EVENEMENT -->
  <div style="background:#0d1f3c; padding:20px 24px; border-bottom:0.5px solid #1a3a5c;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-size:11px; color:#4a7a9b; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px;" id="event-sport"></div>
        <div style="font-size:20px; font-weight:500; color:#fff; margin-bottom:4px;" id="event-nom"></div>
        <div style="font-size:12px; color:#4a7a9b;" id="event-dates"></div>
        <div style="font-size:12px; color:#4a7a9b; margin-top:2px;" id="event-nom-complet"></div>
      </div>
      <span class="badge" id="event-statut"></span>
    </div>
  </div>

  <div class="page-body">

    <!-- VOTE BONUS -->
    <div id="bonus-section" style="display:none;">
      <div class="section-label">Vote bonus — Vainqueur du tournoi</div>
      <div class="card" id="bonus-card" style="border:0.5px solid #f97316;"></div>
    </div>

    <!-- MATCHS A VOTER -->
    <div id="open-section" style="display:none;">
      <div class="section-label">Matchs à voter</div>
      <div id="open-matches"></div>
    </div>

    <!-- MATCHS TERMINES -->
    <div id="done-section" style="display:none;">
      <div class="divider"></div>
      <div class="section-label">Matchs terminés</div>
      <div id="done-matches"></div>
    </div>

    <!-- PHASES VERROUILLEES -->
    <div id="locked-section" style="display:none;">
      <div class="divider"></div>
      <div class="section-label">Phases suivantes</div>
      <div id="locked-phases"></div>
    </div>

  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { initNav } from './js/nav.js';
    
    let currentUser = null;
    
    window.addEventListener('load', async () => {
      currentUser = initNav();
      if (!currentUser) return;
      if (!eventId) { window.location.href = 'index.html'; return; }
      await loadEvent();
      await loadBonus();
      await loadMatches();
      await loadLockedPhases();
    });

    // ========== DRAPEAUX ==========
    function flag(equipe) {
      const codes = {
        'Mexique': 'mx', 'Afrique du Sud': 'za', 'Canada': 'ca',
        'Bosnie-Herzégovine': 'ba', 'Allemagne': 'de', "Côte d'Ivoire": 'ci',
        'États-Unis': 'us', 'Paraguay': 'py', 'Brésil': 'br', 'Maroc': 'ma',
        'Qatar': 'qa', 'Suisse': 'ch', 'Argentine': 'ar', 'Slovaquie': 'sk',
        'Japon': 'jp', 'Sénégal': 'sn', 'Espagne': 'es', 'Suède': 'se',
        'Portugal': 'pt', 'Zimbabwe': 'zw', 'France': 'fr', 'Uruguay': 'uy',
        'Belgique': 'be', 'Tunisie': 'tn', 'Angleterre': 'gb-eng', 'Croatie': 'hr',
        'Pays-Bas': 'nl', 'Arabie Saoudite': 'sa', 'Australie': 'au',
        'Nigeria': 'ng', 'Corée du Sud': 'kr', 'Tchéquie': 'cz'
      };
      const code = codes[equipe];
      if (!code) return equipe;
      return `<img src="https://flagcdn.com/16x12/${code}.png" style="vertical-align:middle; margin-right:4px;"/> ${equipe}`;
    }
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('id');

    let currentUser = null;
    let currentEvent = null;

    window.addEventListener('load', async () => {
      const u = localStorage.getItem('karma_user');
      currentUser = u ? JSON.parse(u) : null;
      if (!currentUser) { window.location.href = 'login.html'; return; }

      document.getElementById('mode-badge').textContent = currentUser.mode;
      document.getElementById('avatar').textContent = currentUser.login.substring(0, 2).toUpperCase();

      if (!eventId) { window.location.href = 'index.html'; return; }

      await loadEvent();
      await loadBonus();
      await loadMatches();
      await loadLockedPhases();
    });

    // ========== EVENEMENT ==========
    async function loadEvent() {
      const { data } = await supabase.from('events').select('*').eq('id', eventId).single();
      if (!data) return;
      currentEvent = data;

      document.getElementById('event-sport').textContent = `${data.sport} · Coupe du Monde 2026`;
      document.getElementById('event-nom').textContent = data.nom;
      document.getElementById('event-nom-complet').textContent = data.nom_complet;
      document.getElementById('event-dates').textContent =
        `${formatDate(data.date_debut)} — ${formatDate(data.date_fin)}`;

      const statut = data.statut;
      const badge = document.getElementById('event-statut');
      badge.textContent = statut === 'en_cours' ? 'En cours' : statut === 'a_venir' ? 'À venir' : 'Terminé';
      badge.className = `badge ${statut === 'en_cours' ? 'badge-live' : statut === 'a_venir' ? 'badge-soon' : 'badge-done'}`;
    }

    // ========== VOTE BONUS ==========
    async function loadBonus() {
      const section = document.getElementById('bonus-section');
      const card = document.getElementById('bonus-card');
      section.style.display = 'block';

      const { data: existing } = await supabase
        .from('votes_bonus')
        .select('*')
        .eq('user_id', currentUser.id)
        .eq('event_id', eventId)
        .single();

      const { data: firstMatch } = await supabase
        .from('matches')
        .select('date_heure')
        .eq('event_id', eventId)
        .order('date_heure')
        .limit(1)
        .single();

      const isLocked = firstMatch && new Date() >= new Date(firstMatch.date_heure);

      if (existing) {
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-size:13px; font-weight:500; color:#f97316; margin-bottom:4px;">Vainqueur du tournoi</div>
              <div style="font-size:13px; color:#fff;">Votre vote : <strong>${flag(existing.equipe_gagnante_vote)}</strong></div>
            </div>
            <span class="badge badge-locked">Verrouillé</span>
          </div>`;
      } else if (isLocked) {
        card.innerHTML = `
          <div style="font-size:13px; font-weight:500; color:#f97316; margin-bottom:4px;">Vainqueur du tournoi</div>
          <div style="font-size:13px; color:#6a8caa;">⏰ Vote fermé — le tournoi a déjà commencé.</div>`;
      } else {
        const { data: matches } = await supabase
          .from('matches')
          .select('equipe_1, equipe_2')
          .eq('event_id', eventId);

        const equipes = [...new Set(matches?.flatMap(m => [m.equipe_1, m.equipe_2]) || [])].sort();

        card.innerHTML = `
          <div style="font-size:13px; font-weight:500; color:#f97316; margin-bottom:8px;">🏆 Vainqueur du tournoi</div>
          <div style="font-size:12px; color:#4a7a9b; margin-bottom:10px;">Ce vote sera verrouillé au coup d'envoi du 1er match !</div>
          <div class="form-group">
            <select id="bonus-select" style="width:100%;">
              <option value="">-- Choisir une équipe --</option>
              ${equipes.map(e => `<option value="${e}">${flag(e)}</option>`).join('')}
            </select>
          </div>
          <button onclick="saveBonus()" style="width:auto; padding:7px 16px;">Valider mon vote bonus</button>`;
      }
    }

    window.saveBonus = async function() {
      const equipe = document.getElementById('bonus-select').value;
      if (!equipe) { alert('Choisissez une équipe !'); return; }

      const { error } = await supabase.from('votes_bonus').insert({
        user_id: currentUser.id,
        event_id: eventId,
        equipe_gagnante_vote: equipe,
        verrouille: false
      });

      if (error) { alert('Erreur : ' + error.message); return; }
      loadBonus();
    }

    // ========== MATCHS ==========
    async function loadMatches() {
      const { data: matches } = await supabase
        .from('matches')
        .select('*')
        .eq('event_id', eventId)
        .order('date_heure');

      if (!matches) return;

      const now = new Date();
      const open = matches.filter(m => m.statut === 'a_venir' && new Date(m.date_heure) > now);
      const done = matches.filter(m => m.statut === 'termine');

      const { data: mesVotes } = await supabase
        .from('votes')
        .select('*')
        .eq('user_id', currentUser.id)
        .in('match_id', matches.map(m => m.id));

      const votesMap = {};
      mesVotes?.forEach(v => { votesMap[v.match_id] = v; });

      if (open.length > 0) {
        document.getElementById('open-section').style.display = 'block';
        await renderOpenMatches(open, votesMap);
      }

      if (done.length > 0) {
        document.getElementById('done-section').style.display = 'block';
        await renderDoneMatches(done, votesMap);
      }
    }

    async function renderOpenMatches(matches, votesMap) {
      const container = document.getElementById('open-matches');
      container.innerHTML = '';

      const grouped = {};
      matches.forEach(m => {
        if (!grouped[m.phase]) grouped[m.phase] = [];
        grouped[m.phase].push(m);
      });

      for (const [phase, matchs] of Object.entries(grouped)) {
        container.innerHTML += `<div style="font-size:13px; font-weight:500; color:#38bdf8; margin:12px 0 8px; padding-bottom:6px; border-bottom:0.5px solid #1a3a5c;">${phase}</div>`;

        for (const m of matchs) {
          const monVote = votesMap[m.id];
          let votesAutres = '';

          if (currentUser.mode === 'MOUTON') {
            const { data: votes } = await supabase
              .from('votes')
              .select('*, users!inner(login)')
              .eq('match_id', m.id);

            if (votes && votes.length > 0) {
              votesAutres = `<div class="votes-list" style="margin-top:8px;">
                <div class="votes-list-title">Votes déjà déposés</div>
                ${votes.map(v => `
                  <div class="vote-row">
                    <span class="vote-player ${v.user_id === currentUser.id ? 'me' : ''}">${v.users.login}${v.user_id === currentUser.id ? ' (vous)' : ''}</span>
                    <span class="vote-score">${v.score_vote_1} — ${v.score_vote_2}</span>
                  </div>`).join('')}
              </div>`;
            } else {
              votesAutres = `<div class="votes-list" style="margin-top:8px;">
                <div style="font-size:12px; color:#4a7a9b; font-style:italic;">Personne n'a encore voté</div>
              </div>`;
            }
          }

          container.innerHTML += `
            <div class="card" style="margin-bottom:8px;">
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:11px; color:#4a7a9b;">${formatDate(m.date_heure)}</span>
                <span class="badge badge-open" style="font-size:10px; padding:2px 8px;">Votes ouverts</span>
              </div>
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <span style="flex:1; font-size:13px; color:#fff;">${flag(m.equipe_1)}</span>
                <div style="display:flex; align-items:center; gap:6px;">
                  <input type="number" min="0" max="20" id="s1-${m.id}"
                    value="${monVote ? monVote.score_vote_1 : ''}"
                    style="width:40px; background:#0a1628; border:0.5px solid #1a3a5c; border-radius:6px; color:#fff; font-size:14px; text-align:center; padding:4px 0;"/>
                  <span style="color:#4a7a9b;">—</span>
                  <input type="number" min="0" max="20" id="s2-${m.id}"
                    value="${monVote ? monVote.score_vote_2 : ''}"
                    style="width:40px; background:#0a1628; border:0.5px solid #1a3a5c; border-radius:6px; color:#fff; font-size:14px; text-align:center; padding:4px 0;"/>
                </div>
                <span style="flex:1; font-size:13px; color:#fff; text-align:right;">${flag(m.equipe_2)}</span>
              </div>
              <button onclick="saveVote('${m.id}', '${monVote ? monVote.id : ''}')"
                class="${monVote ? 'btn-secondary' : ''}"
                style="width:auto; padding:6px 14px;">
                ${monVote ? '✏️ Modifier mon vote' : '✅ Valider mon vote'}
              </button>
              ${votesAutres}
            </div>`;
        }
      }
    }

    async function renderDoneMatches(matches, votesMap) {
      const container = document.getElementById('done-matches');
      container.innerHTML = '';

      const grouped = {};
      matches.forEach(m => {
        if (!grouped[m.phase]) grouped[m.phase] = [];
        grouped[m.phase].push(m);
      });

      for (const [phase, matchs] of Object.entries(grouped)) {
        container.innerHTML += `<div style="font-size:13px; font-weight:500; color:#38bdf8; margin:12px 0 8px; padding-bottom:6px; border-bottom:0.5px solid #1a3a5c;">${phase}</div>`;

        for (const m of matchs) {
          const { data: votes } = await supabase
            .from('votes')
            .select('*, users!inner(login)')
            .eq('match_id', m.id);

          const r1 = m.score_final_1;
          const r2 = m.score_final_2;

          const votesHtml = votes?.map(v => {
            const isMe = v.user_id === currentUser.id;
            const bonGagnant = (r1 > r2 && v.score_vote_1 > v.score_vote_2) ||
                               (r1 < r2 && v.score_vote_1 < v.score_vote_2) ||
                               (r1 === r2 && v.score_vote_1 === v.score_vote_2);
            const scoreExact = r1 === v.score_vote_1 && r2 === v.score_vote_2;
            const classe = scoreExact ? 'correct' : bonGagnant ? '' : 'wrong';
            const pts = scoreExact ? 4 : bonGagnant ? 3 : 0;

            return `<div class="vote-row">
              <span class="vote-player ${isMe ? 'me' : ''}">${v.users.login}${isMe ? ' (vous)' : ''}</span>
              <span class="vote-score ${classe}">${v.score_vote_1} — ${v.score_vote_2} · ${pts} pt${pts > 1 ? 's' : ''}</span>
            </div>`;
          }).join('') || '<div style="font-size:12px; color:#4a7a9b;">Aucun vote</div>';

          container.innerHTML += `
            <div class="card" style="margin-bottom:8px; border-color:#0f2a1a;">
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:11px; color:#4a7a9b;">${formatDate(m.date_heure)}</span>
                <span class="badge badge-done" style="font-size:10px; padding:2px 8px;">Terminé</span>
              </div>
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <span style="flex:1; font-size:13px; color:#fff;">${flag(m.equipe_1)}</span>
                <div style="display:flex; align-items:center; gap:6px;">
                  <div style="width:36px; background:#0a1628; border:0.5px solid #1a3a5c; border-radius:6px; color:#4ade80; font-size:14px; font-weight:500; text-align:center; padding:4px 0;">${r1}</div>
                  <span style="color:#4a7a9b;">—</span>
                  <div style="width:36px; background:#0a1628; border:0.5px solid #1a3a5c; border-radius:6px; color:#4ade80; font-size:14px; font-weight:500; text-align:center; padding:4px 0;">${r2}</div>
                </div>
                <span style="flex:1; font-size:13px; color:#fff; text-align:right;">${flag(m.equipe_2)}</span>
              </div>
              <div class="votes-list">
                <div class="votes-list-title">Votes de tous les joueurs</div>
                ${votesHtml}
              </div>
            </div>`;
        }
      }
    }

    window.saveVote = async function(matchId, existingVoteId) {
      const s1 = parseInt(document.getElementById('s1-' + matchId).value);
      const s2 = parseInt(document.getElementById('s2-' + matchId).value);

      if (isNaN(s1) || isNaN(s2)) {
        alert('Merci de saisir les deux scores.');
        return;
      }

      let error;
      if (existingVoteId) {
        ({ error } = await supabase.from('votes').update({
          score_vote_1: s1, score_vote_2: s2
        }).eq('id', existingVoteId));
      } else {
        ({ error } = await supabase.from('votes').insert({
          user_id: currentUser.id,
          match_id: matchId,
          score_vote_1: s1,
          score_vote_2: s2,
          verrouille: false
        }));
      }

      if (error) { alert('Erreur : ' + error.message); return; }

      const btn = document.querySelector(`button[onclick="saveVote('${matchId}', '${existingVoteId}')"]`);
      if (btn) {
        btn.textContent = '✓ Vote enregistré !';
        btn.style.background = '#4ade80';
        btn.style.color = '#0a1628';
        setTimeout(() => location.reload(), 1000);
      }
    }

    // ========== PHASES VERROUILLEES ==========
    async function loadLockedPhases() {
      const phases = ['Seizièmes de finale', 'Huitièmes de finale', 'Quarts de finale', 'Demi-finales', 'Finale'];

      const { data: matches } = await supabase
        .from('matches')
        .select('phase')
        .eq('event_id', eventId);

      const phasesActives = [...new Set(matches?.map(m => m.phase) || [])];
      const phasesVerr = phases.filter(p => !phasesActives.includes(p));

      if (phasesVerr.length === 0) return;

      document.getElementById('locked-section').style.display = 'block';
      const container = document.getElementById('locked-phases');
      container.innerHTML = phasesVerr.map(p => `
        <div style="display:flex; justify-content:space-between; align-items:center;
          background:#0d1f3c; border:0.5px dashed #1a3a5c; border-radius:10px;
          padding:12px 16px; margin-bottom:8px;">
          <span style="font-size:13px; color:#4a7a9b;">🔒 ${p}</span>
          <span class="badge badge-locked">Verrouillée</span>
        </div>`).join('');
    }

    // ========== UTILITAIRES ==========
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
  </script>
</body>
</html>
