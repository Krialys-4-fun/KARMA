<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KARMA</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo"><span>K</span>ARMA</div>
    <div class="navbar-links">
      <a class="navbar-link active" href="home.html">Accueil</a>
      <a class="navbar-link" href="events.html">Évènements</a>
      <a class="navbar-link" id="admin-link" href="admin.html" style="display:none;">Admin</a>
    </div>
    <div class="navbar-user">
      <span class="mode-badge" id="mode-badge"></span>
      <div class="avatar" id="avatar"></div>
    </div>
  </nav>

  <!-- HERO -->
  <div style="
    background: rgba(255, 252, 248, 0.92);
    padding: 28px 32px;
    border-bottom: 0.5px solid #e8e0d8;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  ">
    <div style="font-size:11px; color:#f97316; letter-spacing:2px; text-transform:uppercase; font-weight:600; margin-bottom:8px;">Bienvenue sur KARMA</div>
    <div style="font-size:24px; font-weight:700; color:#1a1a2e; margin-bottom:6px;">Krialys Au Rendez-vous des Meilleurs Analystes</div>
    <div style="font-size:13px; color:#6a6a8a;">Paris sportifs internes — sans argent, juste la gloire ! ⚽🏉🏆</div>
  </div>

  <!-- CONTENU -->
  <div class="page-body">

    <!-- EVENEMENT EN COURS -->
    <div id="current-event-section" style="display:none;">
      <div class="section-label">Évènement en cours</div>
      <div class="card card-accent" id="current-event-card"></div>
      <div class="section-label">Classement provisoire</div>
      <div class="card" id="current-ranking"></div>
    </div>

    <!-- PROCHAIN EVENEMENT -->
    <div id="next-event-section" style="display:none;">
      <div class="section-label">Prochain évènement</div>
      <div class="card" id="next-event-card"></div>
    </div>

    <div class="divider"></div>

    <!-- DERNIER EVENEMENT TERMINE -->
    <div id="last-event-section" style="display:none;">
      <div class="section-label">Dernier évènement terminé</div>
      <div class="card card-accent" id="last-event-card"></div>
    </div>

  </div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
