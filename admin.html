<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KARMA — Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo"><span>K</span>ARMA</div>
    <div class="navbar-links">
      <a class="navbar-link" href="home.html">Accueil</a>
      <a class="navbar-link" href="events.html">Évènements</a>
      <a class="navbar-link" href="historique.html">Historique</a>
      <a class="navbar-link" href="faq.html">FAQ</a>
      <a class="navbar-link active" href="admin.html">Admin</a>
    </div>
    <div class="navbar-user">
      <span class="badge" style="background:#2a1a0a; color:#f97316; border:0.5px solid #f97316;">Admin</span>
      <div class="avatar" id="avatar" onclick="handleLogout()"></div>
    </div>
  </nav>

  <div style="display:flex; min-height:calc(100vh - 60px);">

    <!-- SIDEBAR -->
    <div style="width:180px; background:#0d1f3c; border-right:0.5px solid #1a3a5c; padding:16px 0; flex-shrink:0;">
      <div class="sidebar-item active" id="menu-users" onclick="showSection('users')">Utilisateurs</div>
      <div style="height:0.5px; background:#1a3a5c; margin:8px 16px;"></div>
      <div class="sidebar-item" id="menu-events" onclick="showSection('events')">Évènements</div>
      <div style="height:0.5px; background:#1a3a5c; margin:8px 16px;"></div>
      <div class="sidebar-item" id="menu-results" onclick="showSection('results')">Résultats</div>
      <div style="height:0.5px; background:#1a3a5c; margin:8px 16px;"></div>
      <div class="sidebar-item" id="menu-phases" onclick="showSection('phases')">Phases</div>
    </div>

    <!-- CONTENU -->
    <div style="flex:1; padding:20px 24px; overflow:auto;">

      <!-- UTILISATEURS -->
      <div class="admin-section" id="s-users">
        <div style="font-size:16px; font-weight:500; color:#fff; margin-bottom:16px;">Gestion des utilisateurs</div>
        <button onclick="showAddUser()" style="width:auto; padding:8px 16px; margin-bottom:16px;">+ Nouvel utilisateur</button>

        <div id="add-user-form" style="display:none;" class="card">
          <div style="font-size:13px; font-weight:500; color:#fff; margin-bottom:12px;">Nouvel utilisateur</div>
          <div class="form-group"><label>Login</label><input type="text" id="new-login" placeholder="ex: doudou"/></div>
          <div class="form-group"><label>Mot de passe</label><input type="password" id="new-password" placeholder="••••••••"/></div>
          <div class="form-group"><label>Rôle</label>
            <select id="new-role">
              <option value="USER">USER</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
          <div id="add-user-error" class="error-msg" style="display:none;"></div>
          <div style="display:flex; gap:8px;">
            <button onclick="addUser()" style="width:auto; padding:8px 16px;">Créer</button>
            <button onclick="hideAddUser()" class="btn-secondary" style="width:auto; padding:8px 16px;">Annuler</button>
          </div>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
          <table class="data-table" id="users-table">
            <thead><tr>
              <th>Login</th><th>Rôle</th><th>Mode</th><th>Statut</th><th>Actions</th>
            </tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- EVENEMENTS -->
      <div class="admin-section" id="s-events" style="display:none;">
        <div style="font-size:16px; font-weight:500; color:#fff; margin-bottom:16px;">Gestion des évènements</div>

        <div class="card">
          <div style="font-size:13px; font-weight:500; color:#fff; margin-bottom:12px;">Créer un évènement</div>
          <div class="form-group"><label>Nom court (ex: TACLER)</label><input type="text" id="ev-nom"/></div>
          <div class="form-group"><label>Nom complet</label><input type="text" id="ev-nom-complet" placeholder="Toujours Analyser..."/></div>
          <div class="form-group"><label>Sport</label>
            <select id="ev-sport">
              <option>Football</option>
              <option>Rugby</option>
              <option>Autre</option>
            </select>
          </div>
          <div style="display:flex; gap:12px;">
            <div class="form-group" style="flex:1;"><label>Date début</label><input type="date" id="ev-debut"/></div>
            <div class="form-group" style="flex:1;"><label>Date fin</label><input type="date" id="ev-fin"/></div>
          </div>
          <div id="ev-error" class="error-msg" style="display:none;"></div>
          <button onclick="creerEvent()" style="width:auto; padding:8px 16px;">Créer l'évènement</button>
        </div>

        <div class="section-label">Évènements existants</div>
        <div id="events-list"></div>
      </div>

      <!-- RESULTATS -->
      <div class="admin-section" id="s-results" style="display:none;">
        <div style="font-size:16px; font-weight:500; color:#fff; margin-bottom:16px;">Saisie des résultats</div>
        <div class="form-group">
          <label>Évènement</label>
          <select id="results-event-select" onchange="loadMatchesToResult()"></select>
        </div>
        <div id="matches-to-result"></div>
      </div>

      <!-- PHASES -->
      <div class="admin-section" id="s-phases" style="display:none;">
        <div style="font-size:16px; font-weight:500; color:#fff; margin-bottom:16px;">Déverrouillage des phases</div>
        <div class="form-group">
          <label>Évènement</label>
          <select id="phases-event-select" onchange="loadPhases()"></select>
        </div>
        <div id="phases-list"></div>
      </div>

    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
