<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KARMA — Connexion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
  <script type="module">
  import './js/auth.js';
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.handleLogin();
  });
</script>
<body class="login-page">

  <div class="login-container">
    <div class="login-logo">
      <span>K</span>ARMA
    </div>
    <div class="login-subtitle">Krialys Au Rendez-vous des Meilleurs Analystes</div>

    <div class="login-card">
      <div id="login-error" class="error-msg" style="display:none;">
        Login ou mot de passe incorrect.<br/>
        <span style="font-size:11px; color:#f97316;">Mot de passe oublié ? Contactez Adeline ou Doudou !</span>
      </div>
      <div class="form-group">
        <label>Login</label>
        <div style="position:relative;">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
            style="width:100%; background:rgba(10, 22, 40, 0.9); border:0.5px solid #1a3a5c; border-radius:6px; color:#ccd6e0; font-size:13px; padding:9px 36px 9px 12px; outline:none;"/>
          <span onclick="togglePassword()" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:16px; user-select:none;" id="eye-icon">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button id="login-btn">Se connecter</button>
    </div>
  </div>

  <script type="module">
  import './js/auth.js';
</script>
<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = '🙈';
    } else {
      input.type = 'password';
      icon.textContent = '👁';
    }
  }
</script>
</body>
</html>
